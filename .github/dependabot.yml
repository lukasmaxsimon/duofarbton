version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      payload:
        patterns:
          - '@payloadcms/*'
          - payload
      next:
        patterns:
          - next
          - eslint-config-next
          - '@next/*'
      dev-tools:
        dependency-type: development
        patterns:
          - '*'
    ignore:
      - dependency-name: '@types/node'
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: eslint
        update-types: [version-update:semver-major]
